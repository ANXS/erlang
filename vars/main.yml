  - "erlang-parsetools"
  - "erlang-public-key"
  - "erlang-ssl"
  - "erlang-syntax-tools"
  - "erlang-tools"
  - "erlang-dev"
  - "erlang-eunit"
  - "erlang-common-test"
  - "erlang-dialyzer"
  - "erlang-edoc"
  - "erlang-erl-docgen"
