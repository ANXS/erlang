---
erlang_version_major: "27"

# Override for non-root installs (e.g. workstation provisioning).
erlang_user: "root"
erlang_group: "root"

erlang_cache_path: "/var/cache/anxs-erlang"
erlang_directory_mode: "0755"
erlang_file_mode: "0644"

erlang_rebar: false
erlang_rebar_version: "3.27.0"
erlang_rebar_cache_file: "anxs-rebar-version"
erlang_rebar_path: "/usr/local/bin"

erlang_epmd_managed: true
erlang_epmd_unit_kind: "socket"
erlang_epmd_listen_address: "127.0.0.1"
erlang_epmd_port: 4369
# Accepted but not yet wired to ExecStart.
erlang_epmd_extra_args: ""
# Non-loopback listen requires this latch set to true.
erlang_epmd_allow_remote: false
